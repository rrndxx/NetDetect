<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetDetect Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Arial', sans-serif;
        }
        .sidebar {
            height: 100vh;
            background-color: #002B5B;
            color: white;
            position: fixed;
            width: 250px;
            padding-top: 1rem;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            display: block;
        }
        .sidebar a:hover {
            background-color: #00509e;
        }
        .main-content {
            margin-left: 250px;
            padding: 20px;
        }
        .header {
            background-color: #002B5B;
            color: white;
            padding: 10px;
            text-align: center;
            margin-bottom: 20px;
        }
        .card {
            margin-bottom: 20px;
        }
        .card-header {
            background-color: #002B5B;
            color: white;
        }
        .btn-primary {
            background-color: #00509e;
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2 class="text-center">NetDetect</h2>
        <a href="#">Dashboard</a>
        <a href="#">Network Monitoring</a>
        <a href="#">IP/MAC Authorization</a>
        <a href="#">Bandwidth Tracking</a>
        <a href="#">Settings</a>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="header">
            <h3>Admin Dashboard</h3>
        </div>

        <!-- Summary Section -->
        <div class="row">
            <div class="col-lg-4 col-md-6">
                <div class="card">
                    <div class="card-header">Connected Devices</div>
                    <div class="card-body">
                        <canvas id="deviceChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-lg-4 col-md-6">
                <div class="card">
                    <div class="card-header">Bandwidth Usage</div>
                    <div class="card-body">
                        <canvas id="bandwidthChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-lg-4 col-md-12">
                <div class="card">
                    <div class="card-header">Alerts</div>
                    <div class="card-body">
                        <button class="btn btn-primary w-100 mb-2">View Unauthorized Devices</button>
                        <button class="btn btn-primary w-100">View Bandwidth Alerts</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- IP Authorization Table -->
        <div class="card">
            <div class="card-header">IP/MAC Address Authorization</div>
            <div class="card-body">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Device</th>
                            <th>IP Address</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Device 1</td>
                            <td>192.168.0.1</td>
                            <td>Unauthorized</td>
                            <td><button class="btn btn-success btn-sm">Authorize</button></td>
                        </tr>
                        <tr>
                            <td>Device 2</td>
                            <td>192.168.0.2</td>
                            <td>Authorized</td>
                            <td><button class="btn btn-danger btn-sm">Revoke</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // Device Chart
        const deviceCtx = document.getElementById('deviceChart').getContext('2d');
        const deviceChart = new Chart(deviceCtx, {
            type: 'doughnut',
            data: {
                labels: ['Connected', 'Unauthorized'],
                datasets: [{
                    label: '# of Devices',
                    data: [120, 30],
                    backgroundColor: ['#00509e', '#f53d3d']
                }]
            }
        });

        // Bandwidth Chart
        const bandwidthCtx = document.getElementById('bandwidthChart').getContext('2d');
        const bandwidthChart = new Chart(bandwidthCtx, {
            type: 'line',
            data: {
                labels: ['12AM', '4AM', '8AM', '12PM', '4PM', '8PM'],
                datasets: [{
                    label: 'Bandwidth Usage (Mbps)',
                    data: [50, 75, 150, 200, 175, 120],
                    backgroundColor: '#00509e',
                    borderColor: '#00509e',
                    fill: true,
                    tension: 0.4
                }]
            }
        });
    </script>
</body>
</html>
