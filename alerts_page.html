<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetDetect - Alerts</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f7f7;
            padding: 20px;
        }

        .alert-container {
            background-color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        h2 {
            margin-bottom: 15px;
            font-size: 24px;
            color: #333;
        }

        .alert {
            margin-bottom: 20px;
            padding: 15px;
            background-color: #ffcccc;
            border-left: 5px solid red;
            border-radius: 8px;
        }

        .alert strong {
            display: block;
            margin-bottom: 5px;
        }

        .alert button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.3s ease;
        }

        .alert button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="alert-container">
        <h2>Unauthorized Access Alerts</h2>

        <div class="alert">
            <strong>Device: 192.168.0.4</strong>
            Time: 12:45 PM - 21 October 2024
            <br>
            <button>Authorize</button>
            <button style="background-color: red; margin-left: 10px;">Block</button>
        </div>
    </div>

</body>
</html>
